name: Feature request
description: Suggest an improvement or new capability for devctl.
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config example
      description: If this can be config-driven, sketch the `devctl.yaml` shape.
      render: yaml
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety and compatibility
      options:
        - label: This can be implemented without shell evaluation.
        - label: This can be cross-platform.
        - label: This can be tested without requiring external CLIs in CI.
